name: omnyx

networks:
  omnyx_net:
    driver: bridge

volumes:
  kafka_data:
  pg_data:
  ts_data:
  redis_data:
  keycloak_data:
  grafana_data:
  loki_data:

services:

  # =========================================================
  # INFRA — always up (no profile)
  # Run:  docker compose up -d
  # =========================================================

  # ----- Kafka (KRaft, single broker) ----------------------
  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Two listeners: INTERNAL for bridge-net services, EXTERNAL for host-net services (dal-bacnet)
      KAFKA_LISTENERS: "INTERNAL://:9092,EXTERNAL://:9095,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://localhost:9095"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: "168"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qg}"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "9095:9095"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - omnyx_net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ../kafka/create_topics.sh:/init.sh:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - omnyx_net
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: omnyx
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - omnyx_net
    restart: unless-stopped

  # ----- PostgreSQL 16 (Primary App + Source DB) -----------
  # Pure PostgreSQL 16 with pgvector — source.*, app.*, audit.*, embeddings.*
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnyx}
      POSTGRES_USER: ${POSTGRES_USER:-omnyx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../postgres/migrations:/docker-entrypoint-initdb.d:ro
      - ../../simulations/gl_pbs/data:/seeds:ro
    networks:
      - omnyx_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ----- TimescaleDB (Telemetry only) ----------------------
  # TimescaleDB on PG16 — telemetry.* (hypertables, compression, retention)
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-omnyx_ts}
      POSTGRES_USER: ${TIMESCALE_USER:-omnyx}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-change-me}
    ports:
      - "${TIMESCALE_PORT:-5433}:5432"
    volumes:
      - ts_data:/var/lib/postgresql/data
      - ../timescaledb/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - omnyx_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ----- Redis 7.2 -----------------------------------------
  redis:
    image: redis:7.2-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - omnyx_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ----- Keycloak 24 ----------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm"]
    ports:
      - "${KEYCLOAK_PORT:-8282}:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me}
      KC_HTTP_PORT: "8080"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/omnyx-realm.json:ro
    networks:
      - omnyx_net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  # ----- Prometheus -----------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "docker-host:172.27.0.1"
    networks:
      - omnyx_net
    restart: unless-stopped

  # ----- Grafana --------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    depends_on:
      - prometheus
      - loki
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-omnyx2024}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - omnyx_net
    restart: unless-stopped

  # ----- Loki -----------------------------------------------
  loki:
    image: grafana/loki:2.9.8
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks:
      - omnyx_net
    restart: unless-stopped

  # ----- Grafana Alloy (replaces EOL Promtail) --------------
  alloy:
    image: grafana/alloy:latest
    depends_on:
      - loki
    ports:
      - "${ALLOY_PORT:-12345}:12345"
    volumes:
      - ../prometheus/alloy.river:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.alloy"]
    networks:
      - omnyx_net
    restart: unless-stopped

  # =========================================================
  # APP SERVICES — start with: docker compose --profile app up -d
  # Or individual: docker compose --profile app up api-service -d
  # =========================================================

  # ----- BACnet Simulator (gl_pbs) -------------------------
  bacnet-sim:
    profiles: ["simulator"]
    build:
      context: ../../simulations/gl_pbs
      dockerfile: Dockerfile.sim
    network_mode: "host"
    restart: unless-stopped

  # ----- DAL: BACnet reader --------------------------------
  dal-bacnet:
    profiles: ["app"]
    build:
      context: ../../services/dal-bacnet
    network_mode: "host"
    volumes:
      - ../../simulations/gl_pbs/data/eqp_name_handling.csv:/app/data/eqp_name_handling.csv:ro
      - ../../simulations/gl_pbs/config/GLBACpypes.ini:/app/config/GLBACpypes.ini:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_EXTERNAL:-localhost:9095}
      APP_DB_URL: postgresql://${POSTGRES_USER:-omnyx}:${POSTGRES_PASSWORD:-change-me}@localhost:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-omnyx}
      BACNET_INI: /app/config/GLBACpypes.ini
      CSV_PATH: /app/data/eqp_name_handling.csv
      COV_THRESHOLD_PCT: "3"
      TENANT_ID: ${TENANT_ID:-unicharm}
      METRICS_PORT: "8010"
    restart: unless-stopped

  # ----- DAL: Unicharm history replay ----------------------
  dal-replay:
    profiles: ["replay"]
    build:
      context: ../../services/dal-replay
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_DB_URL: postgresql://${POSTGRES_USER:-omnyx}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-omnyx}
      # dal-replay reads source.ibms_readings from postgres — no MySQL needed
      TENANT_ID: ${TENANT_ID:-unicharm}
    networks:
      - omnyx_net
    restart: "no"

  # ----- DB Writer (writes Kafka → TimescaleDB) ------------
  db-writer:
    profiles: ["app"]
    build:
      context: ../../services/db-writer
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TELEMETRY_DB_URL: postgresql://${TIMESCALE_USER:-omnyx}:${TIMESCALE_PASSWORD:-change-me}@timescaledb:5432/${TIMESCALE_DB:-omnyx_ts}
      KAFKA_GROUP_ID: db-writer
      TENANT_ID: ${TENANT_ID:-unicharm}
      METRICS_PORT: "8011"
    networks:
      - omnyx_net
    restart: unless-stopped

  # ----- DQ ETL (Tier 2 async jobs) — STUB, Gate 3 ----------
  dq-etl:
    profiles: ["app"]
    build:
      context: ../../services/dq-etl
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      APP_DB_URL: postgresql://${POSTGRES_USER:-omnyx}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-omnyx}
      TELEMETRY_DB_URL: postgresql://${TIMESCALE_USER:-omnyx}:${TIMESCALE_PASSWORD:-change-me}@timescaledb:5432/${TIMESCALE_DB:-omnyx_ts}
      TENANT_ID: ${TENANT_ID:-unicharm}
      METRICS_PORT: "8012"
    networks:
      - omnyx_net
    restart: "no"

  # ----- Digital Twin Broker — STUB, Gate 3 ----------------
  twin-broker:
    profiles: ["app"]
    build:
      context: ../../services/twin-broker
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_DB_URL: postgresql://${POSTGRES_USER:-omnyx}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-omnyx}
      TELEMETRY_DB_URL: postgresql://${TIMESCALE_USER:-omnyx}:${TIMESCALE_PASSWORD:-change-me}@timescaledb:5432/${TIMESCALE_DB:-omnyx_ts}
      KAFKA_GROUP_ID: twin-broker
      TENANT_ID: ${TENANT_ID:-unicharm}
      METRICS_PORT: "8013"
    networks:
      - omnyx_net
    restart: "no"

  # ----- RL Broker — STUB, Gate 3 --------------------------
  rl-broker:
    profiles: ["app"]
    build:
      context: ../../services/rl-broker
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_DB_URL: postgresql://${POSTGRES_USER:-omnyx}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-omnyx}
      TELEMETRY_DB_URL: postgresql://${TIMESCALE_USER:-omnyx}:${TIMESCALE_PASSWORD:-change-me}@timescaledb:5432/${TIMESCALE_DB:-omnyx_ts}
      KAFKA_GROUP_ID: rl-broker
      TENANT_ID: ${TENANT_ID:-unicharm}
      METRICS_PORT: "8014"
    networks:
      - omnyx_net
    restart: "no"

  # ----- Agentic AI — STUB, Gate 3 -------------------------
  agentic-ai:
    profiles: ["app"]
    build:
      context: ../../services/agentic-ai
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_BACKEND: ${LLM_BACKEND:-claude}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      API_BASE_URL: http://api-service:8000
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/omnyx/protocol/openid-connect/token
      KEYCLOAK_CLIENT_ID: omnyx-api
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_API_SECRET:-omnyx-api-secret-change-me}
      APP_DB_URL: postgresql://${POSTGRES_USER:-omnyx}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-omnyx}
      TENANT_ID: ${TENANT_ID:-unicharm}
      METRICS_PORT: "8015"
    networks:
      - omnyx_net
    restart: "no"

  # ----- API Service (Fastify) — dual DB pool --------------
  api-service:
    profiles: ["app"]
    build:
      context: ../../services/api-service
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_DB_URL: postgresql://${POSTGRES_USER:-omnyx}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-omnyx}
      TELEMETRY_DB_URL: postgresql://${TIMESCALE_USER:-omnyx}:${TIMESCALE_PASSWORD:-change-me}@timescaledb:5432/${TIMESCALE_DB:-omnyx_ts}
      REDIS_URL: redis://redis:6379
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/omnyx/protocol/openid-connect/certs
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/omnyx
      KEYCLOAK_CLIENT_ID: omnyx-api
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_API_SECRET:-omnyx-api-secret-change-me}
      TENANT_ID: ${TENANT_ID:-unicharm}
      NODE_ENV: ${NODE_ENV:-production}
    networks:
      - omnyx_net
    restart: unless-stopped

  # ----- WebSocket Bridge ----------------------------------
  ws-bridge:
    profiles: ["app"]
    build:
      context: ../../services/ws-bridge
    depends_on:
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "${WS_PORT:-8765}:8765"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/omnyx/protocol/openid-connect/certs
      TENANT_ID: ${TENANT_ID:-unicharm}
      SNAPSHOT_INTERVAL_MS: "5000"
    networks:
      - omnyx_net
    restart: unless-stopped

  # ----- Frontend (React 18 + Vite + Nginx) ----------------
  frontend:
    profiles: ["app"]
    build:
      context: ../../services/frontend
    depends_on:
      - api-service
      - ws-bridge
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      VITE_API_BASE: http://localhost:${API_PORT:-8000}
      VITE_WS_BASE: ws://localhost:${WS_PORT:-8765}
      VITE_KEYCLOAK_URL: http://localhost:${KEYCLOAK_PORT:-8282}
      VITE_KEYCLOAK_REALM: omnyx
      VITE_KEYCLOAK_CLIENT_ID: omnyx-frontend
    networks:
      - omnyx_net
    restart: unless-stopped
