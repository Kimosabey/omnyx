services:
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka

  kafka-init:
    image: bitnami/kafka:3.7
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ../kafka/create_topics.sh:/init.sh:ro

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: omnyx
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  postgres:
    image: timescale/timescaledb:2.14-pg16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnyx}
      POSTGRES_USER: ${POSTGRES_USER:-omnyx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../postgres/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7.2-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm"]
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me}
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  prometheus:
    image: prom/prometheus:v2.51.0
    depends_on:
      - api-service
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:10.4.2
    depends_on:
      - prometheus
      - loki
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro

  loki:
    image: grafana/loki:2.9.8
    ports:
      - "${LOKI_PORT:-3100}:3100"

  promtail:
    image: grafana/promtail:2.9.8
    depends_on:
      - loki
    volumes:
      - ../prometheus/promtail.yml:/etc/promtail/config.yml:ro

  bacnet-sim:
    profiles: ["simulator"]
    build:
      context: ../../../../simulations/gl_pbs
      dockerfile: Dockerfile.sim

  dal-bacnet:
    build:
      context: ../../services/dal-bacnet
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  dal-replay:
    profiles: ["replay"]
    build:
      context: ../../services/dal-replay
    depends_on:
      - kafka
      - postgres

  db-writer:
    build:
      context: ../../services/db-writer
    depends_on:
      - kafka
      - postgres

  dq-etl:
    build:
      context: ../../services/dq-etl
    depends_on:
      - postgres

  twin-broker:
    build:
      context: ../../services/twin-broker
    depends_on:
      - kafka
      - postgres

  rl-broker:
    build:
      context: ../../services/rl-broker
    depends_on:
      - kafka
      - postgres

  agentic-ai:
    build:
      context: ../../services/agentic-ai
    depends_on:
      - api-service
      - redis
    environment:
      LLM_BACKEND: ${LLM_BACKEND:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}

  api-service:
    build:
      context: ../../services/api-service
    depends_on:
      - postgres
      - redis
      - kafka
      - keycloak
    ports:
      - "${API_PORT:-8000}:8000"

  ws-bridge:
    build:
      context: ../../services/ws-bridge
    depends_on:
      - kafka
      - keycloak
    ports:
      - "${WS_PORT:-8765}:8765"

  frontend:
    build:
      context: ../../services/frontend
    depends_on:
      - api-service
      - ws-bridge
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  kafka_data:
  pg_data:
  redis_data:
