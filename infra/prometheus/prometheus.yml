global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: omnyx

scrape_configs:

  # API service — metrics on separate port 9091
  - job_name: api-service
    static_configs:
      - targets: ["api-service:9091"]
        labels: { service: api-service }

  # DB Writer — kafka consumer + db write metrics
  - job_name: db-writer
    static_configs:
      - targets: ["db-writer:8011"]
        labels: { service: db-writer }

  # DAL-BACnet — runs host-network; reached via docker-host alias (see compose extra_hosts)
  - job_name: dal-bacnet
    static_configs:
      - targets: ["docker-host:8010"]
        labels: { service: dal-bacnet }

  # Prometheus self-scrape
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels: { service: prometheus }
