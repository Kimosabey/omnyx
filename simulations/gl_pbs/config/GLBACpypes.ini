controllermap={"DDC01": "127.0.0.1:2001","DDC01_01": "127.0.0.1:2002","DDC02": "127.0.0.1:2003","DDC03": "127.0.0.1:2004","DDC04": "127.0.0.1:2005","DDC05": "127.0.0.1:2006","DDC06": "127.0.0.1:2007","DDC07": "127.0.0.1:2008","DDC07_01": "127.0.0.1:2009","DDC09": "127.0.0.1:2010","DDC10": "127.0.0.1:2011"}
 
