[BACpypes]
; ── BACnet device identity ────────────────────────────────────────────────────
; Used by both bacnet_reader.py and bacnet_writer.py.
; Writer extra settings (HTTP host/port, post-route) are passed as CLI args.
objectName: PBS2_UNICHARM
address:   127.0.0.1/24
objectIdentifier: 8623
maxApduLengthAccepted: 1024
segmentationSupported: segmentedBoth
vendorIdentifier: 15
foreignBBMD: 128.253.109.254
foreignTTL: 30

; ── Site / network ────────────────────────────────────────────────────────────
defaultIPAddress:   127.0.0.1
useEthernet: True
autoDetectIP: False
myBACnetPort: 8623
discoverDeviceIPAddress: True
useLocalDDCSimulators: False

; ── Data acquisition ─────────────────────────────────────────────────────────
rpmRequestsFile: ./data/eqp_name_handling.csv
useReadPropertyMultiple: True
interBatchInterval: 0.1
rpmBatchSize: 15
recurringDataLoad: True
numberOfReadCycles: -1
allowMultipleSamplingRates: False
counterLimit: 13
USE_OBJECT_NAME_HANDLER: True

; ── Change-of-Value ───────────────────────────────────────────────────────────
checkCoV: True
CoVThresholdPercent:3
dataAcquisitionHeartbeatMinutes: 15
dataAcquisitionTimeoutSecs: 15
dataAcquisitionMaximumRetryAttempts: 3

; ── Notification ──────────────────────────────────────────────────────────────
postURL: http://127.0.0.1:8899/post
notifyReadData: ONLY_COV
webPostTimeoutSecs: 2.5

; ── Database ──────────────────────────────────────────────────────────────────
insertRMDataintoDB: False
ibms_database_name: jupiter_new
databasehost: localhost
databaseuser: root
databasePassword: admin
usePerEquipmentTable: True
useMultipleTables: True
createEquipmentTable: False
databaseTableNameLength: 10

; ── Codebook / deployment ─────────────────────────────────────────────────────
GLCodeBookCSV: ./data/CBParameters.csv
deploymentDetailsFile: ./data/GLSDeploymentDetails.json
storeEquipmentParameterData: True

; ── Web monitor (bacnet_reader) ───────────────────────────────────────────────
enablePBS2web: True
PBS2Webport: 8624
threadDumpFilePrefix: tdout_

; ── BACnet device routing ─────────────────────────────────────────────────────


