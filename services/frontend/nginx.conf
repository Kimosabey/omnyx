worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security headers — WCAG-friendly, accessible
    add_header X-Frame-Options        "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header Referrer-Policy        "strict-origin"        always;
    add_header X-XSS-Protection       "1; mode=block"        always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws: wss:;"
        always;

    sendfile   on;
    tcp_nopush on;
    gzip       on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    server {
        listen      80;
        server_name _;
        root        /app/dist;
        index       index.html;

        # Health check
        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Static assets with long-term caching
        location ~* \.(js|css|woff2?|png|svg|ico)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            try_files   $uri =404;
        }

        # SPA fallback — all routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }
    }
}
